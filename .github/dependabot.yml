# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
    # Keep a single open pull request for grouped GitHub Actions dependencies
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    # Rebase open pull requests when changes are detected
    rebase-strategy: "auto"

  # Maintain dependencies for NuGet packages
  - package-ecosystem: "nuget" 
    directory: "/" 
    schedule:
      interval: "daily"
    groups:
      dotnet:
        patterns:
          - "*"
    # Keep a single open pull request for grouped NuGet dependencies
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    # Rebase open pull requests when changes are detected
    rebase-strategy: "auto"
