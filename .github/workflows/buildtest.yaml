name: Build and Test

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    name: Dotnet build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
           8.0.x
           9.0.x
           10.0.x
      - name: Build
        run: dotnet build --configuration Release 
      - name: Test
        run: dotnet test --configuration Release --collect:"Code Coverage;Format=Cobertura" --logger trx --results-directory TestResults --settings CodeCoverage.runsettings --no-build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          directory: ./TestResults
          files: '*.cobertura.xml'
      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
        if: ${{ always() }} # Always run this step even on failure

  # Test code gen for visual studio compatibility >> https://github.com/kubernetes-client/csharp/pull/1008
  codgen:
    runs-on: windows-2025-vs2026
    name: MSBuild build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0
      - name: Setup dotnet SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.1xx'
      - name: Restore nugets (msbuild)
        run: msbuild .\src\KubernetesClient\ -t:restore -p:RestorePackagesConfig=true
      - name: Build (msbuild)
        run: msbuild .\src\KubernetesClient\

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
           8.0.x
           9.0.x
           10.0.x
      - name: Minikube
        run: minikube start
      - name: Test
        run: |
          true > skip.log
          env K8S_E2E_MINIKUBE=1 dotnet test tests/E2E.Tests --logger "SkipTestLogger;file=$PWD/skip.log" -p:BuildInParallel=false
          if [ -s skip.log ]; then
            cat skip.log
            echo "CASES MUST NOT BE SKIPPED"
            exit 1
          fi    
      - name: AOT Test
        run: |
          true > skip.log
          env K8S_E2E_MINIKUBE=1 dotnet test tests/E2E.Aot.Tests --logger "SkipTestLogger;file=$PWD/skip.log" -p:BuildInParallel=false
          if [ -s skip.log ]; then
            cat skip.log
            echo "CASES MUST NOT BE SKIPPED"
            exit 1
          fi              

  # Run the .NET Framework (net48) end to end tests on Windows. There is no
  # Linux Kubernetes distribution that runs natively on a Windows runner, so the
  # kindest/node image (which already bundles containerd, the kubelet and the
  # control-plane components) is imported straight into WSL with oci-to-wsl.
  # WSL2 is enabled by default on the runner, so no separate WSL provisioning is
  # needed, and the API server is reachable from the Windows host (which runs the
  # net48 test process) through WSL2 localhost forwarding.
  e2e-windows-net48:
    runs-on: windows-latest
    name: E2E net48 (kind in WSL)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
           8.0.x
           10.0.x
      - name: Install oci-to-wsl
        shell: pwsh
        run: |
          $url = "https://github.com/tg123/oci-to-wsl/releases/download/v0.0.1/oci-to-wsl_windows_x86_64.zip"
          $expected = "79772846F1CE4A38E5B2841EA2406A070F4DB64F3DBF3EA32F04B519111FD003"
          Invoke-WebRequest $url -OutFile oci-to-wsl.zip
          $actual = (Get-FileHash oci-to-wsl.zip -Algorithm SHA256).Hash
          if ($actual -ne $expected) {
            throw "oci-to-wsl checksum mismatch: expected $expected, got $actual"
          }
          Expand-Archive -Force oci-to-wsl.zip -DestinationPath .
      - name: Start kind cluster in WSL
        shell: pwsh
        run: |
          # Import kindest/node into WSL as a systemd-enabled distro named "kind".
          .\oci-to-wsl.exe --profile .github/e2e/kind-wsl.yaml

          # Reboot the distro so the systemd configuration written by the profile
          # takes effect, then bring up the single node control plane in place.
          wsl --shutdown
          wsl -d kind -u root -- bash /usr/local/bin/bootstrap-kind.sh

          # Export a kubeconfig for the Windows host. kubeadm points it at the WSL
          # eth0 address; rewrite it to localhost, which WSL2 forwards into WSL.
          wsl -d kind -u root -- cat /etc/kubernetes/admin.conf | Out-File -Encoding ascii kind.kubeconfig
          (Get-Content kind.kubeconfig) -replace 'server: https://[^ ]+', 'server: https://127.0.0.1:6443' | Set-Content kind.kubeconfig
      - name: E2E net48 Test
        shell: pwsh
        env:
          K8S_E2E_MINIKUBE: "1"
          KUBECONFIG: ${{ github.workspace }}\kind.kubeconfig
        run: |
          "" | Out-File -Encoding ascii skip.log
          dotnet test tests/E2E.Classic.Tests -f net48 --logger "SkipTestLogger;file=$PWD/skip.log" -p:BuildInParallel=false
          if ((Get-Item skip.log).Length -gt 0) {
            Get-Content skip.log
            Write-Error "CASES MUST NOT BE SKIPPED"
            exit 1
          }

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
